apiVersion: apps/v1
kind: Deployment
metadata:
  name: filestore-api-java
  namespace: poc-filestore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: filestore-api-java
  template:
    metadata:
      labels:
        app: filestore-api-java
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: filestore-api-java
          image: us-ashburn-1.ocir.io/<NAMESPACE>/filestore-api:java-v2.0
          ports:
            - containerPort: 8080
          env:
            - name: STORAGE_PATH
              value: "/mnt/filestore"
            - name: SFTP_HOST
              value: "sftp-server-svc"      # nombre del Service de K8s
            - name: SFTP_PORT
              value: "22"
            - name: SFTP_USERNAME
              value: "sftpuser"
            - name: SFTP_PASSWORD
              value: "sftppass123"
            - name: SFTP_REMOTE_DIR
              value: "/upload"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10